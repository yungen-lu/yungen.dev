{{ define "main" }}
{{ .Content }}
<h2>Recent posts</h2>
<ul class="blog-posts">
  {{ range first 10 (where .Site.RegularPages "Section" "in" (slice "blog" "reviews")) }}
  <li>
    <span><i><time datetime='{{ .Date.Format "2006-01-02" }}'>{{ .Date.Format (default "02 Jan, 2006" .Site.Params.dateFormat) }}</time></i></span>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
